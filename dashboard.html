<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Dashboard | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #f8fafc;">
    <div style="display: flex; min-height: 100vh;">
        <aside style="width: 250px; background: var(--text); color: white; padding: 2rem;">
            <h2 style="font-style: italic; font-weight: 900; margin-bottom: 3rem;">GR TRAVELER</h2>
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="#" style="color: var(--accent); text-decoration: none; font-weight: 700;">Active Manifests</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">Travel History</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">Cargo Registry</a>
            </nav>
        </aside>

        <main style="flex: 1; padding: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h2 style="font-weight: 900; text-transform: uppercase; font-style: italic;">Welcome, Traveler</h2>
                <button class="btn btn-primary">New Booking</button>
            </div>

            <div class="card" style="margin-bottom: 2rem;">
                <h4 style="text-transform: uppercase; font-size: 0.75rem; font-weight: 900; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Next Corridor Shift</h4>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <p style="font-size: 0.75rem; color: grey;">ROUTE</p>
                        <p style="font-weight: 900; font-size: 1.25rem;">NAIROBI → NAKURU</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-size: 0.75rem; color: grey;">BOARDING</p>
                        <p style="font-weight: 900; font-size: 1.25rem; font-style: italic;">08:00 AM</p>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; background: var(--border); padding: 1rem; border-radius: 0.5rem; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 700; font-size: 0.75rem;">SEAT ALLOCATION: #04</span>
                    <span style="color: var(--primary); font-weight: 900; font-size: 0.75rem;">MANIFEST VERIFIED</span>
                </div>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
