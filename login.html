<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Rift Dispatch - Access Terminal</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-bg min-h-screen flex items-center justify-center p-4 font-sans antialiased text-text">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 bg-white rounded-2xl shadow-2xl overflow-hidden border border-border">
      <!-- Image Side -->
      <div class="bg-primary p-12 text-white hidden md:flex flex-col justify-between relative overflow-hidden">
        <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/2 w-64 h-64 bg-blue-900 rounded-full blur-3xl opacity-30"></div>
        <div class="relative z-10">
          <a href="/" class="flex items-center space-x-2 mb-12 group">
            <div class="bg-accent p-1.5 rounded-lg group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-white">
                  <path d="M4 18h16"></path>
                  <circle cx="18" cy="18" r="2"></circle>
                  <circle cx="6" cy="18" r="2"></circle>
                  <path d="M19 18V9a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9"></path>
                  <path d="M16 9v4"></path>
                  <path d="M3 13h16"></path>
                  <path d="M8 9h4"></path>
                </svg>
            </div>
            <span class="text-xl font-black italic tracking-tighter uppercase">Great Rift<span class="text-accent underline decoration-2 underline-offset-4">Sacco</span></span>
          </a>
          <h2 class="text-4xl font-black leading-[1.1] mb-6">Connect to the <br/>Rift Valley <br/><span class="text-accent">Network.</span></h2>
          <p class="text-blue-100 text-sm font-medium leading-relaxed opacity-80">Experience precision logistics, real-time tracking, and premium traveler services across Kenya.</p>
        </div>
        <div class="relative z-10">
          <div class="flex items-center space-x-4 mb-4">
            <div class="flex -space-x-3">
              <img src="https://i.pravatar.cc/100?u=1" class="w-9 h-9 rounded-full border-2 border-primary shadow-lg"/>
              <img src="https://i.pravatar.cc/100?u=2" class="w-9 h-9 rounded-full border-2 border-primary shadow-lg"/>
              <img src="https://i.pravatar.cc/100?u=3" class="w-9 h-9 rounded-full border-2 border-primary shadow-lg"/>
            </div>
            <p class="text-[10px] font-black uppercase tracking-widest text-blue-300">50k+ Active Members</p>
          </div>
        </div>
      </div>

      <!-- Auth Form Side -->
      <div class="p-8 md:p-12 self-center">
        <div id="login-view">
          <span class="text-accent font-black text-[10px] uppercase tracking-[3px] mb-2 block">Authentication</span>
          <h3 class="text-2xl font-black text-primary mb-1">Access Terminal</h3>
          <p class="text-xs text-gray-400 font-bold mb-8 uppercase tracking-tight">Login to manage your logistics & trips.</p>
          
          <form id="login-form" class="space-y-4">
            <div class="flex flex-col gap-1.5">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Network Identity (Email)</label>
              <div class="relative">
                <i data-lucide="mail" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                <input type="email" id="login-email" required class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-2.5 text-sm font-semibold focus:ring-2 focus:ring-accent outline-none transition-all"/>
              </div>
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Secure Key (Password)</label>
              <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                <input type="password" id="login-password" required class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-2.5 text-sm font-semibold focus:ring-2 focus:ring-accent outline-none transition-all"/>
              </div>
            </div>
            <button type="submit" class="w-full bg-primary text-white font-black py-4 rounded-xl hover:bg-blue-900 transition-all shadow-xl shadow-blue-900/10 mt-6 text-sm uppercase tracking-widest">
              Authenticate
            </button>
          </form>
          
          <p class="mt-8 text-center text-xs font-black uppercase tracking-tight text-gray-400">
            Offline? <a href="/signup.html" class="text-accent hover:underline">Enroll for Sacco Access</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { api } from '/src/main.js';
      lucide.createIcons();

      document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
          const res = await api.post('/api/auth/login', {
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          });
          localStorage.setItem('user', JSON.stringify(res.user));
          window.location.href = '/dashboard.html';
        } catch (error) {
          alert('Auth failed: ' + error.message);
        }
      };
    </script>
  </body>
</html>
