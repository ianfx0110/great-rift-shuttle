<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clerk Terminal | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #f8fafc;">
    <div style="display: flex; min-height: 100vh;">
        <aside style="width: 250px; background: var(--primary); color: white; padding: 2rem;">
            <h2 style="font-style: italic; font-weight: 900; margin-bottom: 3rem;">TERMINAL CLERK</h2>
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="#" style="color: white; text-decoration: none; font-weight: 700;">Dispatch Desk</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">Parcel Inbound</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">M-Pesa Verification</a>
            </nav>
        </aside>

        <main style="flex: 1; padding: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h2 style="font-weight: 900; text-transform: uppercase; font-style: italic;">Dispatch Terminal</h2>
                <div style="font-weight: 900; text-transform: uppercase; font-size: 0.75rem; color: var(--accent);">Node: Nairobi CBD</div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                <div class="card">
                     <h3 style="font-size: 1rem; font-weight: 900; margin-bottom: 1.5rem; text-transform: uppercase;">Active Manifests</h3>
                     <table style="width: 100%; text-align: left; font-size: 0.875rem;">
                        <tr style="border-bottom: 1px solid var(--border);">
                            <th style="padding: 1rem 0;">Unit</th>
                            <th style="padding: 1rem 0;">Destination</th>
                            <th style="padding: 1rem 0;">Status</th>
                        </tr>
                        <tr>
                            <td style="padding: 1rem 0; font-weight: 900;">KCQ 882L</td>
                            <td style="padding: 1rem 0;">Kisumu</td>
                            <td style="padding: 1rem 0;"><span style="color: var(--accent); font-weight: 900;">BOARDING</span></td>
                        </tr>
                     </table>
                </div>
                <div class="card">
                     <h3 style="font-size: 1rem; font-weight: 900; margin-bottom: 1.5rem; text-transform: uppercase;">Directives</h3>
                     <button class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Verify Ticket</button>
                     <button class="btn btn-accent" style="width: 100%;">Seal Parcel</button>
                </div>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
