<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #f8fafc;">
    <div style="display: flex; min-height: 100vh;">
        <!-- Sidebar -->
        <aside style="width: 250px; background: var(--primary); color: white; padding: 2rem;">
            <h2 style="font-style: italic; font-weight: 900; margin-bottom: 3rem;">GR ADMIN</h2>
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="#" style="color: white; text-decoration: none; font-weight: 700;">Dashboard</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">Fleet Registry</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">Service Crew</a>
                <a href="#" style="color: rgba(255,255,255,0.6); text-decoration: none;">Logistics Map</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main style="flex: 1; padding: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h2 style="font-weight: 900; text-transform: uppercase; font-style: italic;">Operational Overview</h2>
                <div id="user-pill" style="background: white; padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 900;">ADMIN@RIFT</div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem;">
                <div class="card">
                     <p style="font-size: 0.75rem; color: grey;">GROSS INTAKE</p>
                     <h3 style="font-size: 1.5rem; font-weight: 900;">KES 1.2M</h3>
                </div>
                <div class="card">
                     <p style="font-size: 0.75rem; color: grey;">RESERVATIONS</p>
                     <h3 style="font-size: 1.5rem; font-weight: 900;">842</h3>
                </div>
                <div class="card">
                     <p style="font-size: 0.75rem; color: grey;">SERVICE CREW</p>
                     <h3 style="font-size: 1.5rem; font-weight: 900;">24</h3>
                </div>
                <div class="card">
                     <p style="font-size: 0.75rem; color: grey;">FLEET UNITS</p>
                     <h3 style="font-size: 1.5rem; font-weight: 900;">12</h3>
                </div>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
