<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Terminal | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <main class="container" style="padding: 4rem 0; max-width: 600px;">
        <div class="card">
            <h2 style="font-weight: 900; font-style: italic; text-transform: uppercase;">Booking Terminal</h2>
            <p style="color: grey; font-size: 0.875rem; margin-bottom: 2rem;">Secure your node in the transport matrix.</p>
            
            <section style="margin-bottom: 2rem;">
                <h4 style="text-transform: uppercase; font-size: 0.75rem; color: var(--accent); margin-bottom: 1rem;">1. Select Fleet Unit</h4>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div class="card" style="padding: 1rem; cursor: pointer; border-color: var(--accent);">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="font-weight: 900;">08:00 AM • NAIROBI → NAKURU</span>
                            <span style="color: var(--accent); font-weight: 900;">KES 800</span>
                        </div>
                    </div>
                </div>
            </section>

            <button class="btn btn-primary" style="width: 100%; padding: 1.5rem;">Finalize Reservation</button>
        </div>
    </main>
</body>
</html>
