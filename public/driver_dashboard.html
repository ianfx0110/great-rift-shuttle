<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specialist Terminal | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #0f172a;">
    <div style="display: flex; min-height: 100vh;">
        <aside style="width: 250px; background: #1e293b; color: white; padding: 2rem; border-right: 1px solid #334155;">
            <h2 style="font-style: italic; font-weight: 900; margin-bottom: 3rem; color: var(--accent);">SPECIALIST</h2>
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="#" style="color: white; text-decoration: none; font-weight: 700;">Task Matrix</a>
                <a href="#" style="color: #64748b; text-decoration: none;">Fuel Ledger</a>
                <a href="#" style="color: #64748b; text-decoration: none;">Unit Maintenance</a>
            </nav>
        </aside>

        <main style="flex: 1; padding: 3rem; color: white;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h2 style="font-weight: 900; text-transform: uppercase; font-style: italic;">Assigned Shifts</h2>
                <div style="background: #1e293b; padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid #334155; font-size: 0.75rem; font-weight: 900; color: #fb923c;">LIVE: KCQ 123X</div>
            </div>

            <div class="card" style="background: #1e293b; border-color: #334155;">
                <div style="border-left: 4px solid var(--accent); padding-left: 1.5rem;">
                    <p style="font-size: 0.75rem; color: #64748b; font-weight: 900; margin-bottom: 0.5rem;">CURRENT MISSION</p>
                    <h3 style="font-size: 2rem; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 1rem;">Nairobi → Eldoret</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div>
                            <p style="font-size: 0.75rem; color: #64748b;">MANIFEST LOAD</p>
                            <p style="font-weight: 900;">14 / 14 Travelers</p>
                        </div>
                        <div>
                            <p style="font-size: 0.75rem; color: #64748b;">DEPARTURE</p>
                            <p style="font-weight: 900;">10:00 AM</p>
                        </div>
                    </div>
                </div>
                <button class="btn btn-accent" style="width: 100%; margin-top: 2rem; padding: 1rem;">Initialize Corridor Pulse</button>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
