<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking History — Great Rift Shuttle</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .account-layout { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; }
    @media (max-width: 900px) { .account-layout { grid-template-columns: 1fr; gap: 2rem; } }
    .side-nav { position: sticky; top: 120px; }
    .side-link { display: block; padding: 0.75rem 1rem; border-radius: var(--radius-md); font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .side-link:hover, .side-link.active { background: var(--surface-alt); color: var(--primary); }
  </style>
</head>
<body>
  <header></header>

  <main class="py-12">
    <div class="container">
      <div class="account-layout">
        <aside class="side-nav">
          <a href="/account.html" class="side-link">Profile Overview</a>
          <a href="/history.html" class="side-link active">My Bookings</a>
          <a href="/parcel-history.html" class="side-link">My Parcels</a>
          <a href="/notifications.html" class="side-link">Notifications <span class="badge badge-info ml-2">2</span></a>
          <a href="/settings.html" class="side-link">Settings</a>
        </aside>

        <section class="account-content">
          <div class="mb-12">
            <h1>My Bookings</h1>
            <p class="text-muted">Manage your upcoming and past trips.</p>
          </div>

          <div class="mb-12">
            <h3 class="mb-6">Upcoming Trips</h3>
            <div id="active-bookings" class="flex flex-col gap-4">
              <!-- Placeholder for Active -->
              <div class="card p-6 flex justify-between align-center">
                <div class="flex gap-6 align-center">
                  <div class="w-12 h-12 bg-success/10 rounded flex items-center justify-center text-xl">✅</div>
                  <div>
                    <h4 class="text-lg">Nairobi &rarr; Eldoret</h4>
                    <p class="text-sm text-muted">Trip Date: May 15, 2026 | Time: 08:00 AM</p>
                    <p class="text-xs text-primary font-bold mt-1">Ref: GR-982X</p>
                  </div>
                </div>
                <div class="text-right">
                  <span class="badge badge-success">Confirmed</span>
                  <div class="mt-2">
                    <button class="btn btn-outline btn-sm">PDF Ticket</button>
                    <button class="btn btn-ghost btn-sm text-error" style="color:#e74c3c">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div>
            <h3 class="mb-6">Past Trips</h3>
            <div id="past-bookings" class="flex flex-col gap-4">
                <div class="card p-6 flex justify-between align-center opacity-70 grayscale-[0.5]">
                    <div class="flex gap-6 align-center">
                      <div class="w-12 h-12 bg-surface-alt rounded flex items-center justify-center text-xl">⌛</div>
                      <div>
                        <h4>Eldoret &rarr; Nairobi</h4>
                        <p class="text-sm text-muted">Trip Date: April 10, 2026</p>
                      </div>
                    </div>
                    <div class="text-right">
                      <span class="badge" style="background:#eee">Completed</span>
                      <div class="mt-2">
                        <button class="btn btn-ghost btn-sm">Receipt</button>
                      </div>
                    </div>
                </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
