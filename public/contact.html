<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="container" style="padding: 2rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h1 style="font-weight: 900; font-style: italic; color: var(--primary);">GREAT RIFT</h1>
        <nav style="display: flex; gap: 1.5rem;">
            <a href="/" style="text-decoration: none; color: var(--text); font-weight: 700;">Home</a>
            <a href="/about.html" style="text-decoration: none; color: var(--text); font-weight: 700;">About</a>
            <a href="/contact.html" style="text-decoration: none; color: var(--accent); font-weight: 700;">Contact</a>
        </nav>
    </header>

    <main class="container" style="padding: 4rem 0;">
        <div class="text-center" style="margin-bottom: 4rem;">
            <h2 style="font-size: 3rem; font-weight: 900; text-transform: uppercase; font-style: italic;">Support Terminal</h2>
            <p style="color: grey;">Connectivity is our priority.</p>
        </div>

        <div style="display: grid; grid-cols: 1; gap: 2rem; max-width: 800px; margin: 0 auto;">
            <div class="card text-center">
                <i data-lucide="phone" style="width: 2rem; h: 2rem; color: var(--accent); margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 0.5rem;">Voice Dispatch</h3>
                <p style="font-weight: 900; color: var(--primary); font-size: 1.25rem;">+254 115 481 162</p>
            </div>
            
            <div class="card text-center" style="border-color: #25D366;">
                 <i data-lucide="message-square" style="width: 2rem; h: 2rem; color: #25D366; margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 0.5rem;">WhatsApp Channel</h3>
                <a href="https://wa.me/254115481162" class="btn" style="background-color: #25D366; color: white;">Open Chat Room</a>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
