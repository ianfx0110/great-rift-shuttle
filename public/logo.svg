<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A4D2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D7A4F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon Part -->
  <rect x="5" y="10" width="60" height="60" rx="15" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  <path d="M20 40 L35 25 L50 40 M35 25 L35 55" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <text x="35" y="52" font-family="Syne, sans-serif" font-weight="800" font-size="20" fill="white" text-anchor="middle" style="letter-spacing:1px">GRS</text>
  
  <!-- Text Part -->
  <g transform="translate(80, 45)">
    <text font-family="Syne, sans-serif" font-weight="900" font-size="30" fill="#1A4D2E" style="letter-spacing:-1px">GREAT RIFT</text>
    <text x="145" font-family="Syne, sans-serif" font-weight="900" font-size="30" fill="#D4A017" style="letter-spacing:-1px">SHUTTLE</text>
    <text y="18" font-family="DM Sans, sans-serif" font-weight="700" font-size="10" fill="#6B6B6B" style="letter-spacing:2px; text-transform:uppercase">Reliable East African Logistics</text>
  </g>
</svg>
