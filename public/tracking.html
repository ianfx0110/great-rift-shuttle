<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargo Tracking | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="container" style="padding: 2rem 0; border-bottom: 1px solid var(--border);">
        <h1 style="font-weight: 900; font-style: italic; color: var(--primary);">GREAT RIFT</h1>
    </header>

    <main class="container" style="padding: 4rem 0; max-width: 800px;">
        <div class="text-center" style="margin-bottom: 3rem;">
            <h2 style="font-size: 2.5rem; font-weight: 900; text-transform: uppercase; font-style: italic;">Track Tactical Cargo</h2>
            <p style="color: grey;">Real-time node verification for your regional shipments.</p>
        </div>

        <div class="card" style="margin-bottom: 3rem;">
            <form style="display: flex; gap: 1rem;">
                <input type="text" placeholder="Enter Waybill Hash (e.g. GR-992)" style="flex: 1; padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;">
                <button class="btn btn-primary" style="padding: 1rem 2rem;">Interrogate</button>
            </form>
        </div>

        <div id="tracking-result" class="card">
            <div style="padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 900; text-transform: uppercase; font-size: 0.75rem;">Status: <span style="color: var(--accent);">IN TRANSIT</span></span>
                <span style="font-weight: 700; font-size: 0.75rem; color: grey;">WB-88273</span>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 2rem; position: relative;">
                <div style="position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border); z-index: 0;"></div>
                
                <div style="display: flex; gap: 1.5rem; position: relative; z-index: 1;">
                    <div style="width: 16px; h: 16px; border-radius: 50%; background: var(--accent); border: 4px solid var(--bg);"></div>
                    <div>
                        <p style="font-weight: 900; font-size: 0.875rem;">NAIROBI HUB (ORIGIN)</p>
                        <p style="font-size: 0.75rem; color: grey;">Shift: May 05, 08:00 AM</p>
                    </div>
                </div>

                <div style="display: flex; gap: 1.5rem; position: relative; z-index: 1;">
                    <div style="width: 16px; h: 16px; border-radius: 50%; background: var(--border); border: 4px solid var(--bg);"></div>
                    <div>
                        <p style="font-weight: 900; font-size: 0.875rem;">NAKURU NODE (DESTINATION)</p>
                        <p style="font-size: 0.75rem; color: grey;">ETA: May 05, 11:30 AM</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
