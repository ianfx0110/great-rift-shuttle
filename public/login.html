<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <main class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <div class="text-center" style="margin-bottom: 2rem;">
                <h2 style="font-weight: 900; font-style: italic; color: var(--primary);">AUTHORIZE ACCESS</h2>
                <p style="font-size: 0.75rem; font-weight: 700; color: grey; text-transform: uppercase; letter-spacing: 0.1em;">Secure Terminal Login</p>
            </div>
            
            <form style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; font-weight: 900; color: grey; text-transform: uppercase;">Email Address</label>
                    <input type="email" style="padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;" placeholder="pilot@rift.co.ke">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; font-weight: 900; color: grey; text-transform: uppercase;">Password</label>
                    <input type="password" id="login-password" style="padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;" placeholder="••••••••">
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                    <input type="checkbox" id="login-remember" style="width: 1rem; height: 1rem; cursor: pointer;">
                    <label for="login-remember" style="font-size: 0.75rem; font-weight: 700; color: grey; text-transform: uppercase; cursor: pointer;">Remember Manifest</label>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 1rem;">Enter Corridor</button>
            </form>

            <p style="margin-top: 2rem; font-size: 0.875rem; text-align: center;">
                No manifest access? <a href="/signup.html" style="color: var(--accent); font-weight: 700; text-decoration: none;">Register Now</a>
            </p>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // Initial setup
        const emailInput = document.querySelector('input[type="email"]');
        const rememberCheckbox = document.getElementById('login-remember');
        
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            emailInput.value = rememberedEmail;
            rememberCheckbox.checked = true;
        }

        document.querySelector('form').onsubmit = (e) => {
            // Static demo behavior matching user request for public files
            if (rememberCheckbox.checked) {
                localStorage.setItem('rememberedEmail', emailInput.value);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
        };
    </script>
</body>
</html>
