<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <main class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <div class="text-center" style="margin-bottom: 2rem;">
                <h2 style="font-weight: 900; font-style: italic; color: var(--primary);">SPECIALIST REGISTRATION</h2>
                <p style="font-size: 0.75rem; font-weight: 700; color: grey; text-transform: uppercase; letter-spacing: 0.1em;">Join the corridor elite</p>
            </div>
            
            <form style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.75rem; font-weight: 900; color: grey; text-transform: uppercase;">Full Name</label>
                        <input type="text" style="padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;" placeholder="Jane Doe">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.75rem; font-weight: 900; color: grey; text-transform: uppercase;">Phone Number</label>
                        <input type="tel" style="padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;" placeholder="0712 345 678">
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; font-weight: 900; color: grey; text-transform: uppercase;">Email Address</label>
                    <input type="email" style="padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;" placeholder="jane@dispatch.co.ke">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label style="font-size: 0.75rem; font-weight: 900; color: grey; text-transform: uppercase;">Password</label>
                    <input type="password" style="padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border); outline: none;" placeholder="Create strong password">
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 1rem;">Initialize Enrollment</button>
            </form>

            <p style="margin-top: 2rem; font-size: 0.875rem; text-align: center;">
                Already enrolled? <a href="/login.html" style="color: var(--accent); font-weight: 700; text-decoration: none;">Login Here</a>
            </p>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
