<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send/Ship Parcel — Great Rift Shuttle</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .step-indicator { display: flex; gap: 1rem; margin-bottom: 2.5rem; justify-content: space-between; }
    .step { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
    .step.active { background: var(--primary); }
    .parcel-step { display: none; }
    .parcel-step.active { display: block; }
  </style>
</head>
<body>
  <header></header>

  <main class="py-12">
    <div class="container" style="max-width: 700px;">
      <div class="card p-8">
        <h1 class="text-3xl mb-2">Send a Parcel</h1>
        <p class="text-muted mb-8">Secure, tracked, and insured delivery across Kenya.</p>

        <div class="step-indicator">
          <div class="step active" id="step-bar-1"></div>
          <div class="step" id="step-bar-2"></div>
          <div class="step" id="step-bar-3"></div>
        </div>

        <form id="parcel-form">
          <!-- Step 1: Package Info -->
          <div class="parcel-step active" id="step-1">
            <h3 class="mb-6">Package Details</h3>
            <div class="grid grid-2 gap-4 mb-4">
              <div class="form-group">
                <label class="label">Origin Town</label>
                <select name="sender_town_id" class="input-field" required>
                  <option value="1">Nairobi</option>
                  <option value="2">Eldoret</option>
                </select>
              </div>
              <div class="form-group">
                <label class="label">Destination Town</label>
                <select name="destination_town_id" class="input-field" required>
                  <option value="2">Eldoret</option>
                  <option value="1">Nairobi</option>
                </select>
              </div>
            </div>
            <div class="grid grid-2 gap-4 mb-6">
              <div class="form-group">
                <label class="label">Weight (approx KG)</label>
                <input type="number" name="weight_kg" step="0.5" class="input-field" placeholder="1.0" required>
              </div>
              <div class="form-group">
                <label class="label">Category</label>
                <select name="size_category" class="input-field">
                  <option value="small">Document / Small Envelope</option>
                  <option value="medium">Standard Box (up to 5kg)</option>
                  <option value="large">Large Bag / Crate</option>
                  <option value="fragile">Fragile / Electronics</option>
                </select>
              </div>
            </div>
            <div class="form-group mb-8">
              <label class="label">Brief Description</label>
              <input type="text" name="description" class="input-field" placeholder="e.g. Spare parts, Laptop, Clothing">
            </div>
            <button type="button" class="btn btn-primary w-full h-12" onclick="nextStep(2)">Continue to Recipient Info</button>
          </div>

          <!-- Step 2: Recipient Info -->
          <div class="parcel-step" id="step-2">
            <h3 class="mb-6">Recipient Information</h3>
            <div class="form-group mb-4">
              <label class="label">Recipient Full Name</label>
              <input type="text" name="recipient_name" class="input-field" required>
            </div>
            <div class="form-group mb-8">
              <label class="label">Recipient Phone Number (M-Pesa enabled)</label>
              <input type="tel" name="recipient_phone" class="input-field" placeholder="07XXXXXXXX" required>
            </div>
            <div class="flex gap-4">
              <button type="button" class="btn btn-outline flex-1" onclick="nextStep(1)">Back</button>
              <button type="button" class="btn btn-primary flex-1" onclick="calculateQuote()">Get Price & Pay</button>
            </div>
          </div>

          <!-- Step 3: Payment -->
          <div class="parcel-step" id="step-3">
            <div class="text-center mb-8">
              <p class="text-muted uppercase text-xs font-bold tracking-widest">Delivery Quote</p>
              <h2 class="text-4xl font-bold mt-2">KES <span id="quote-amount">500</span></h2>
              <p class="text-sm text-muted mt-2">Includes GPS tracking and basic insurance.</p>
            </div>

            <div class="bg-surface-alt p-6 rounded-xl mb-8 border border-border">
              <div class="flex justify-between mb-2">
                <span class="text-sm">Sender Town</span>
                <span id="summary-from" class="text-sm font-bold">---</span>
              </div>
              <div class="flex justify-between mb-2">
                <span class="text-sm">Destination</span>
                <span id="summary-to" class="text-sm font-bold">---</span>
              </div>
              <div class="flex justify-between">
                <span class="text-sm">Recipient</span>
                <span id="summary-recipient" class="text-sm font-bold">---</span>
              </div>
            </div>

            <p class="text-xs font-bold uppercase text-muted mb-4">Payment Method</p>
            <div class="card p-4 border-primary bg-primary/5 mb-8 flex items-center justify-between cursor-pointer">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-success rounded-full flex items-center justify-center text-white font-bold">M</div>
                <div>
                  <h4 class="text-sm">M-Pesa Express</h4>
                  <p class="text-xs text-muted">STK Push to your phone</p>
                </div>
              </div>
              <span class="text-primary">●</span>
            </div>

            <button type="submit" class="btn btn-primary w-full h-12 uppercase tracking-widest shadow-lg">Confirm & Send</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer></footer>

  <script type="module" src="/js/main.js"></script>
  <script>
    let currentStep = 1;

    function nextStep(step) {
      document.querySelectorAll('.parcel-step').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.step').forEach((s, idx) => {
        if (idx < step) s.classList.add('active');
        else s.classList.remove('active');
      });
      document.getElementById(`step-${step}`).classList.add('active');
      currentStep = step;
    }

    async function calculateQuote() {
      const form = document.getElementById('parcel-form');
      const formData = new FormData(form);
      
      const weight = formData.get('weight_kg');
      const category = formData.get('size_category');

      // Summary for step 3
      document.getElementById('summary-from').innerText = formData.get('sender_town_id') == "1" ? "Nairobi" : "Eldoret";
      document.getElementById('summary-to').innerText = formData.get('destination_town_id') == "1" ? "Nairobi" : "Eldoret";
      document.getElementById('summary-recipient').innerText = formData.get('recipient_name');

      try {
        const res = await fetch(`/api/parcels/quote?weight=${weight}&size=${category}`);
        const data = await res.json();
        document.getElementById('quote-amount').innerText = data.fare;
        nextStep(3);
      } catch (e) {
        alert('Could not get quote');
      }
    }

    document.getElementById('parcel-form').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      data.fare = parseInt(document.getElementById('quote-amount').innerText);

      const res = await fetch('/api/parcels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        const result = await res.json();
        alert(`Success! Tracking Code: ${result.tracking_code}. Awaiting payment confirmation.`);
        window.location.href = `/track.html?code=${result.tracking_code}`;
      } else {
        alert('Failed to process parcel');
      }
    }
  </script>
</body>
</html>
