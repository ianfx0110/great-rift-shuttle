<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Logistics | Great Rift Shuttle</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="container" style="padding: 2rem 0; border-bottom: 1px solid var(--border);">
        <h1 style="font-weight: 900; font-style: italic; color: var(--primary);">GREAT RIFT</h1>
    </header>

    <main class="container" style="padding: 4rem 0;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; items: center;">
            <div>
                <h2 style="font-size: 3rem; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 1.5rem;">Rapid Cargo <br>Deployment</h2>
                <p style="color: grey; margin-bottom: 2rem;">Secure, high-speed parcel delivery across the regional matrix. We offer end-to-end tracking and SMS security codes for every shipment.</p>
                
                <div class="card">
                    <h4 style="text-transform: uppercase; font-size: 0.75rem; margin-bottom: 1rem;">Track Current Shipment</h4>
                    <form style="display: flex; gap: 0.5rem;">
                        <input type="text" placeholder="Waybill Number (e.g. WB-1234)" style="flex: 1; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                        <button class="btn btn-primary">Locate</button>
                    </form>
                </div>
            </div>
            <div class="card">
                <h3 style="text-transform: uppercase; font-style: italic; margin-bottom: 2rem;">Initialize Shipment</h3>
                <form style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div>
                        <label style="font-size: 0.75rem; font-weight: 900; display: block; margin-bottom: 0.5rem;">Package Description</label>
                        <input type="text" placeholder="e.g. Document Envelope" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                         <div>
                            <label style="font-size: 0.75rem; font-weight: 900; display: block; margin-bottom: 0.5rem;">Origin Hub</label>
                            <input type="text" placeholder="NAIROBI" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                        </div>
                         <div>
                            <label style="font-size: 0.75rem; font-weight: 900; display: block; margin-bottom: 0.5rem;">Destination Node</label>
                            <input type="text" placeholder="NAKURU" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                        </div>
                    </div>
                    <button class="btn btn-accent" style="padding: 1.5rem;">Generate Quote</button>
                </form>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
