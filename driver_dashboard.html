<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Deck | Great Rift Shuttle</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-900 text-white font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-white/5 fixed w-full z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <div class="flex items-center space-x-2">
            <a href="/" class="flex items-center space-x-2">
              <div class="bg-accent p-1.5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white w-5 h-5">
                  <path d="M4 18h16"></path>
                  <circle cx="18" cy="18" r="2"></circle>
                  <circle cx="6" cy="18" r="2"></circle>
                  <path d="M19 18V9a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9"></path>
                  <path d="M16 9v4"></path>
                  <path d="M3 13h16"></path>
                  <path d="M8 9h4"></path>
                </svg>
              </div>
              <span class="text-xl font-black italic tracking-tight uppercase">Driver <span class="text-accent underline underline-offset-4 decoration-2">Deck</span></span>
            </a>
          </div>
          <div class="flex items-center space-x-4">
             <button id="logout-btn" class="text-red-400 font-black text-[10px] uppercase tracking-widest hover:text-red-300">Off Duty</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-20">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Status Panel -->
        <div class="lg:col-span-1 space-y-6">
           <div class="bg-white/5 border border-white/10 p-6 rounded-2xl">
              <div class="flex items-center space-x-4 mb-6">
                 <div class="w-12 h-12 rounded-xl bg-orange-500/20 border border-orange-500/30 flex items-center justify-center">
                    <i data-lucide="user" class="text-orange-500 w-6 h-6"></i>
                 </div>
                 <div>
                    <h2 id="driver-name" class="text-lg font-black italic">...</h2>
                    <p class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Active Duty ID: #9921</p>
                 </div>
              </div>
              
              <div class="space-y-4">
                 <div class="flex justify-between items-center p-3 rounded-xl bg-green-500/10 border border-green-500/20">
                    <span class="text-[10px] font-black uppercase text-green-500/70">Duty Status</span>
                    <span class="text-[10px] font-black uppercase text-green-400 flex items-center">
                       <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse mr-2"></span> On Duty
                    </span>
                 </div>
                 <div class="p-3 rounded-xl bg-white/5 border border-white/10">
                    <p class="text-[8px] font-black uppercase text-white/30 mb-1">Assigned Unit</p>
                    <p class="text-sm font-black italic" id="assigned-bus">KCA 123A • Toyota Hiace</p>
                 </div>
              </div>
           </div>

           <div class="bg-accent/10 border border-accent/20 p-6 rounded-2xl">
              <h4 class="text-xs font-black uppercase tracking-widest text-accent mb-4">Nav Command</h4>
              <nav class="space-y-2">
                 <button class="w-full text-left p-3 rounded-xl bg-accent text-white font-black text-[10px] uppercase tracking-widest shadow-lg shadow-accent/20">Active Trip</button>
                 <button class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-white/50 font-black text-[10px] uppercase tracking-widest transition-all">Trip History</button>
                 <button class="w-full text-left p-3 rounded-xl hover:bg-white/5 text-white/50 font-black text-[10px] uppercase tracking-widest transition-all">Maintenance Log</button>
              </nav>
           </div>
        </div>

        <!-- Trips Panel -->
        <div class="lg:col-span-2">
           <div class="flex justify-between items-end mb-8">
              <div>
                 <h1 class="text-3xl font-black italic leading-none mb-2 uppercase">Your Manifests</h1>
                 <p class="text-[10px] text-white/40 font-bold uppercase tracking-[3px]">Confirmed schedules for the next 24H.</p>
              </div>
           </div>

           <div id="driver-trips" class="space-y-4">
              <!-- Loader -->
              <div class="text-center py-20 bg-white/5 rounded-2xl border border-dashed border-white/10">
                 <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent mx-auto mb-4"></div>
                 <p class="text-[10px] font-black text-white/40 uppercase tracking-widest">Accessing Central Dispatch...</p>
              </div>
           </div>
        </div>
      </div>
    </main>

    <script type="module">
      import { api, setupAuth } from '/src/main.js';
      setupAuth();

      const user = JSON.parse(localStorage.getItem('user'));
      if (!user || user.role !== 'driver') {
        window.location.href = '/login.html';
      } else {
        document.getElementById('driver-name').textContent = user.name;
        loadDriverSchedules();
      }

      async function loadDriverSchedules() {
        try {
          // Note: In a real app, we'd filter by driver_id. For this demo, we'll show active schedules.
          const schedules = await api.get('/api/schedules');
          const list = document.getElementById('driver-trips');
          
          if (schedules.length === 0) {
            list.innerHTML = `
              <div class="text-center py-20 bg-white/5 rounded-2xl border border-dashed border-white/10">
                <p class="text-[10px] font-black text-white/40 uppercase tracking-widest">No Active Assignments</p>
              </div>
            `;
            return;
          }

          list.innerHTML = schedules.map(s => `
            <div class="bg-white/5 border border-white/10 p-6 rounded-2xl hover:border-accent transition-all group">
              <div class="flex flex-col md:flex-row md:items-center justify-between">
                <div class="mb-4 md:mb-0">
                  <div class="flex items-center space-x-2 mb-2">
                    <span class="px-2 py-0.5 rounded-md bg-accent/20 text-accent text-[8px] font-black uppercase tracking-widest">${s.type}</span>
                    <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">#SCH-${s.id.toString().padStart(4,'0')}</span>
                  </div>
                  <h3 class="text-xl font-black italic uppercase tracking-tight flex items-center">
                    ${s.origin} <i data-lucide="arrow-right" class="w-4 h-4 mx-3 text-accent"></i> ${s.destination}
                  </h3>
                  <div class="flex items-center space-x-4 mt-3">
                     <div>
                        <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-0.5">Departure</p>
                        <p class="text-[11px] font-bold">${new Date(s.departure_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                     </div>
                     <div class="w-px h-6 bg-white/10"></div>
                     <div>
                        <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-0.5">Fleet Unit</p>
                        <p class="text-[11px] font-bold text-accent font-mono">${s.number_plate}</p>
                     </div>
                     <div class="w-px h-6 bg-white/10"></div>
                     <div>
                        <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-0.5">Booking Load</p>
                        <p class="text-[11px] font-bold">${Math.floor(Math.random()*s.capacity)} / ${s.capacity}</p>
                     </div>
                  </div>
                </div>
                <div>
                   <button class="bg-white text-slate-900 px-6 py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl shadow-white/5 hover:scale-105 transition-all">Start Trip</button>
                </div>
              </div>
            </div>
          `).join('');
          lucide.createIcons();
        } catch (error) {
          console.error(error);
          document.getElementById('driver-trips').innerHTML = `<p class="text-red-400">Error loading assignments.</p>`;
        }
      }

      document.getElementById('logout-btn').onclick = () => {
        localStorage.removeItem('user');
        window.location.href = '/login.html';
      };
    </script>
  </body>
</html>
